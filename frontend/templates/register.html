<!DOCTYPE html>

<html>

<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='st.css') }}">

</head>




<body>
    <div class="home_basic">


        <h1>Register</h1>
        <p>Please fill in this form to create an account.</p>

        <h4>Please Register in order to use Our Sevices</h4>

        <br>
        <form action="{{ url_for('reg') }}" method="POST">
            <div class="container">


                <label for="username"><b>Username</b></label>
                <input type="text" placeholder="Enter username" name="username" id="username" style="display: auto;"
                    required><br>

                <label for="em"><b>Email</b></label>
                <input type="email" placeholder="Enter Email" name="em" id="em" required><br>

                <label for="pw"><b>Password</b></label>
                <input type="password" placeholder="Enter Password" name="pw" id="pw" required>
                <br>
                <dv class="terms">

                    <p>By creating an account you agree to our <a href="#">Terms & Privacy</a>.</p>
                    <button type="submit" class="registerbtn">Register</button>
                </dv>
            </div>

            <div class="container signin">
                <p>Already have an account? <a href="{{ url_for('login') }}">Sign in</a>.</p>
            </div>
        </form>

    </div>


</body>





</html>
